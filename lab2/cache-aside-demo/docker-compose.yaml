version: "3.9"

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5432:5432"

  redis:
    image: eqalpha/keydb
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"